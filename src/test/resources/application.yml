spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

# Dummy JWKS URI — tests use @WithMockUser so the decoder is never invoked,
# but the bean still needs a non-blank URI to construct.
supabase:
  jwks-uri: http://localhost:0/.well-known/jwks.json

# Stub author UUID for tests; controller tests that exercise the
# @PreAuthorize SpEL match this exact string in @WithMockUser usernames
# and SecurityMockMvcRequestPostProcessors.jwt() subjects.
stream:
  author-user-id: 00000000-0000-0000-0000-000000000099
