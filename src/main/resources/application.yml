spring:
  application:
    name: stream-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ── Redis + Cache (optional) ─────────────────────────────────────
  # When REDIS_HOST is set, Spring auto-configures Lettuce + RedisCacheManager
  # with a 5-minute default TTL. Without it (local dev) we exclude the Redis
  # auto-configs so no connection is attempted; @Cacheable still works via
  # the fallback ConcurrentMapCacheManager.
  autoconfigure:
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 0
  cache:
    redis:
      time-to-live: 60s    # 1 min — feed changes more often than profile data
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "stream-svc::"

  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:db.zasidonntwaimayumbks.supabase.co}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 60000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: validate
      default_schema: public
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  jackson:
    default-property-inclusion: non_null

# ── Supabase Auth ──────────────────────────────────────────────────
# Validates Supabase ES256 JWTs via the project's JWKS endpoint.
supabase:
  jwks-uri: ${SUPABASE_JWKS_URI:${SUPABASE_URL}/auth/v1/.well-known/jwks.json}

server:
  port: ${PORT:8082}
  shutdown: graceful

# LOG_FORMAT env var flips structured JSON on in Cloud Run (set LOG_FORMAT=ecs).
# Left empty locally so dev logs stay human-readable.
logging:
  structured:
    format:
      console: ${LOG_FORMAT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
